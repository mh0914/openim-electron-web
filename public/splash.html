<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f8fbff 0%, #eef5ff 100%);
        overflow: hidden;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .logo {
        width: 240px;
        height: 240px;
        object-fit: contain;
        border-radius: 32px;
        box-shadow: 0 18px 40px rgba(104, 163, 245, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="logo-wrap">
      <img class="logo" src="./brand/hubmessage-logo.png" alt="HubMessage logo" />
    </div>
  </body>
</html>
